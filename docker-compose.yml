version: "3.9"

services:
  trading-bot:
    build: .
    restart: always
    env_file: config/.env
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config:/app/config:ro
    command: python -m src.scheduler

  dashboard:
    build: .
    restart: always
    env_file: config/.env
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs:ro
      - ./models:/app/models:ro
      - ./config:/app/config:ro
    command: python -m src.dashboard.server
    depends_on:
      - trading-bot
